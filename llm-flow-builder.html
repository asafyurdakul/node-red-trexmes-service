<!-- ═══════════════════════════════════════════════════════════════════════
     LLM Flow BUILDER — Config Node (Credentials)
     ═══════════════════════════════════════════════════════════════════════ -->
<script type="text/javascript">
  RED.nodes.registerType('llm-flow-builder-config', {
    category: 'config',
    defaults: {
      name      : { value: '' },
      provider  : { value: 'openai' },
      apiUrl    : { value: '' },
      modelName : { value: '' }
    },
    credentials: {
      apiKey: { type: 'password' }
    },
    label: function () {
      return this.name || this.provider + ' Config';
    }
  });

  // ── Provider presets ──────────────────────────────────────────────────────
  const PROVIDER_PRESETS = {
    openai   : { url: 'https://api.openai.com/v1/chat/completions',            model: 'gpt-4o' },
    gemini   : { url: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent', model: 'gemini-1.5-pro' },
    deepseek : { url: 'https://api.deepseek.com/v1/chat/completions',          model: 'deepseek-coder' },
    anthropic: { url: 'https://api.anthropic.com/v1/messages',                 model: 'claude-sonnet-4-20250514' },
    mistral  : { url: 'https://api.mistral.ai/v1/chat/completions',            model: 'mistral-large-latest' },
    groq     : { url: 'https://api.groq.com/openai/v1/chat/completions',       model: 'llama3-70b-8192' },
    custom   : { url: '', model: '' }
  };

  function fillPreset(provider) {
    const p = PROVIDER_PRESETS[provider];
    if (!p) return;
    const urlEl   = document.getElementById('node-config-input-apiUrl');
    const modelEl = document.getElementById('node-config-input-modelName');
    if (urlEl   && (!urlEl.value   || urlEl._wasPreset))   { urlEl.value   = p.url;   urlEl._wasPreset   = !!p.url; }
    if (modelEl && (!modelEl.value || modelEl._wasPreset)) { modelEl.value = p.model; modelEl._wasPreset = !!p.model; }
  }

  // Attach change listener after DOM is ready
  document.addEventListener('DOMContentLoaded', function () {
    const sel = document.getElementById('node-config-input-provider');
    if (sel) sel.addEventListener('change', () => fillPreset(sel.value));
  });
</script>

<script type="text/html" data-template-name="llm-flow-builder">
  <style>
    /* ── Node editor styles ─────────────────────────────── */
    #llm-nb-editor { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    .llm-header {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      border-radius: 10px;
      padding: 16px 20px;

      align-items: center;

    .llm-logo {

      background: linear-gradient(135deg, #1e40af, #3b82f6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .llm-header-text h2 { color: #f1f5f9; margin:0; font-size:16px; font-weight:700; }

    }

    }
    .llm-form-row label {

      padding-top: 6px;
    }

        <b>msg.generatedFlow</b> → Ham JSON array<br>
        <b>msg.llmRawResponse</b> → AI'nın ham cevabı<br>
        <b>msg.importedTab</b> → Import edilen tab ismi
      </div>
    </div>

  </div>
</script>

<script type="text/html" data-help-name="llm-flow-builder">
  <h3>LLM Flow Builder</h3>
  <p>
    Farklı AI servislerine bağlanarak <b>Node-RED flow'u JSON formatında</b> üretir,
    otomatik import eder ve deploy eder.
  </p>

  <h4>Giriş (msg.payload)</h4>
  <p>String formatında prompt gönderin. Örneğin:</p>
  <pre>"MQTT'den veri al, threshold kontrolü yap, aşılırsa e-posta gönder"</pre>

  <h4>Desteklenen Sağlayıcılar</h4>
  <ul>
    <li><b>OpenAI</b> — GPT-4o, GPT-4 Turbo vb.</li>
    <li><b>Google Gemini</b> — Gemini 1.5 Pro vb.</li>
    <li><b>DeepSeek</b> — DeepSeek Coder / Chat</li>
    <li><b>Anthropic Claude</b> — Claude Sonnet, Opus vb.</li>
    <li><b>Mistral AI</b> — Mistral Large vb.</li>
    <li><b>Groq</b> — Llama3, Mixtral vb.</li>
    <li><b>Custom</b> — OpenAI uyumlu herhangi bir endpoint</li>
  </ul>

  <h4>Çıktılar</h4>
  <dl>
    <dt>msg.payload.success</dt><dd>İşlem başarı durumu</dd>
    <dt>msg.payload.flow</dt><dd>Üretilen Node-RED flow array</dd>
    <dt>msg.payload.nodeCount</dt><dd>Flow içindeki toplam node sayısı</dd>
    <dt>msg.generatedFlow</dt><dd>Ham flow JSON array</dd>
    <dt>msg.llmRawResponse</dt><dd>AI'nın ham metin yanıtı</dd>
    <dt>msg.importedTab</dt><dd>Import edilen tab'ın adı</dd>
  </dl>
</script>
