<script type="text/html" data-help-name="Method Returns">
    <p>
        <b>Method Invoker</b> veya <b>Context Getter</b> ile başlatılan asenkron bir işlemin
        <b>dönüş verisini</b> yakalar. Panel işlemi tamamlayıp cevap gönderdiğinde bu node tetiklenir.
    </p>

    <h3>Çıkış</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>
            Panelden dönen veriyi içerir.<br>
            <b>Method Invoker</b> için: method'un return değeri.<br>
            <b>Context Getter</b> için: sorgulanan StateContext'in o anki property değerleri.
        </dd>
    </dl>

    <h3>Özellikler</h3>
    <dl class="message-properties">
        <dt>Method Name <span class="property-type">combobox</span></dt>
        <dd>
            Cevabı dinlenecek node'un adı. Açılır listede mevcut akıştaki tüm
            <b>Method Invoker</b> ve <b>Context Getter</b> node adları listelenir.
            Seçilen ad, kaynak node'un <code>name</code> alanıyla birebir eşleşmelidir.
        </dd>
    </dl>

    <h3>Asenkron Çalışma Modeli</h3>
    <p>Çağrı yapan akış <code>Responser</code> ile kapanır. Panel işlemi tamamladığında Method Returns ayrı bir akış başlatır:</p>
    <pre style="font-size:0.85em; background:#f4f4f4; padding:8px; border-radius:4px;">
[Çağrı akışı]
  Event → Method Invoker / Context Getter → Responser

[Cevap akışı]  (panel hazır olunca)
  Method Returns → ... → Responser</pre>

    <a href="http://www.trex.com.tr" target="_blank">trex Digital Manufacturing</a>
</script>

<script type="text/html" data-help-name="Responser">
    <p>Provides a outputs.It must be connected to the end of each subscribed event stream!!!</p>
    <p>Only the <code>msg.payload</code> is sent.</p>
    <a href="http://www.trex.com.tr" target="_blank">trex Digital Manufacturing</a>
</script>
