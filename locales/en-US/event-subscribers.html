
<script type="text/html" data-help-name="Business Events">
    <p>trexMes panelinden gelen iş akışı olaylarını yakalar.</p>
    <p>Üretim, plan, vardiya, ıskarta, malzeme, bakım ve benzeri iş süreçlerine ait eventler bu node ile dinlenir.</p>
    <h3>Özellikler</h3>
    <dl class="message-properties">
        <dt>Event <span class="property-type">combobox</span></dt>
        <dd>Dinlenecek olay tipi. Seçim yapıldığında açıklama ve <code>msg.payload</code> JSON yapısı gösterilir.</dd>
        <dt>IsHandled <span class="property-type">boolean</span></dt>
        <dd>İşaretlenirse panel bu olayı "handled" olarak işler.</dd>
        <dt>Call Suffix <span class="property-type">string</span></dt>
        <dd>Aynı event tipini birden fazla node'da kullanmak için ayırt edici sonek.</dd>
    </dl>
    <h3>Çıkış</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>Seçili olayın EventArgs verisi. Yapı olaya göre değişir; editörde event seçildiğinde gösterilir.</dd>
    </dl>
    <a href="http://www.trex.com.tr" target="_blank">trex Digital Manufacturing</a>
</script>

<script type="text/html" data-help-name="Method Returns">
    <p>
        <b>Method Invoker</b> veya <b>Context Getter</b> ile başlatılan asenkron bir işlemin
        <b>dönüş verisini</b> yakalar. Panel işlemi tamamlayıp cevap gönderdiğinde bu node tetiklenir.
    </p>

    <h3>Çıkış</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>
            Panelden dönen veriyi içerir.<br>
            <b>Method Invoker</b> için: method'un return değeri.<br>
            <b>Context Getter</b> için: StateContext verisi.
        </dd>
    </dl>

    <h3>Özellikler</h3>
    <dl class="message-properties">
        <dt>Name <span class="property-type">string</span></dt>
        <dd>Node adı. <b>Method Invoker</b> veya <b>Context Getter</b> node'undaki <code>name</code> ile birebir eşleşmelidir.</dd>
    </dl>

    <h3>Çalışma Modeli</h3>
    <pre style="font-size:0.85em; background:#f4f4f4; padding:8px; border-radius:4px;">
Business Events → Method Invoker → Responser
                      ↓ (async)
Method Returns  → [işlem]  → Responser</pre>

    <a href="http://www.trex.com.tr" target="_blank">trex Digital Manufacturing</a>
</script>
