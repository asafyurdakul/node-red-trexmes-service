<script type="text/html" data-help-name="trex Subscriber">
    <p>
        Her trexMes projesinde <b>bir kez</b> kullanılması zorunlu olan temel yapılandırma node'udur.
        Projedeki tüm olay node'larının (Business Events, System Events vb.) kayıt işlemini panele bildirir;
        böylece yalnızca ilgili olaylar yakalanır.
    </p>

    <h3>Çıkış</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>
            Bağlanan trexMes panellerinin IP bilgilerini ve panele bildirilen olay listesini içerir.
            Debug node'u bağlanarak bağlantı durumu izlenebilir.
        </dd>
    </dl>

    <h3>Önemli Notlar</h3>
    <ul>
        <li>Her projede <b>yalnızca bir adet</b> trex Subscriber bulunmalıdır.</li>
        <li>Bu node bağımsız çalışır; çıkışına <b>Responser bağlanmaz</b>.</li>
        <li>Olay akışları bu node'dan değil, Event node'larından (Business Events vb.) başlar.</li>
    </ul>

    <a href="http://www.trex.com.tr" target="_blank">trex Digital Manufacturing</a>
